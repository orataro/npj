<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Alex | NEW PESSI JEANS</title>
  <link rel="stylesheet" href="npj.css">
  <link rel="icon" href="favicon.ico">

<style>
/* ===== 個人ページ ===== */

body {
  background: #000;
  color: #fff;
}


.profile-img {
  width: 250px;
  height: 250px;
  object-fit: contain;
  border-radius: 50%;
  border: 4px solid #fff;
  margin-bottom: 20px;
}

.info {
  font-size: 18px;
  line-height: 1.8;
  text-align: center;
}

/* ===== フィールド ===== */

.field-wrap{
  margin-top:40px;
  text-align:center;
}

.field{
  position: relative;
  width: 300px;
  height: 460px;
  background: #1b7f3a;
  border: 4px solid white;
  border-radius: 12px;

  margin: auto;   /* ←これ追加 */
}

/* ライン */

.center-line {
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  height: 2px;
  background: white;
}

.center-circle {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 70px;
  height: 70px;
  border: 2px solid white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.goal {
  position: absolute;
  left: 50%;
  width: 150px;
  height: 70px;
  border: 2px solid white;
  transform: translateX(-50%);
}

.goal.top { top: 0; border-top: none; }
.goal.bottom { bottom: 0; border-bottom: none; }

/* ===== ポジション点 ===== */

.pos {
  position: absolute;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: white;
}

/* 対応ポジ（光る） */
.active {
  background: #00ffff;
  animation: blink 1s infinite;
  box-shadow: 0 0 12px #00ffff;
}



.profile{
  text-align:center;
  padding:120px 20px 50px;
  max-width:700px;
  margin:auto;
}

.profile h1{
  text-align:center;
  margin-top:10px;
}

.profile-img{
  display:block;
  margin:auto;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}

/* ===== 📱 MOBILE ===== */
@media (max-width: 768px) {

  .profile {
    padding: 30px 15px;
  }

  .profile-img {
    width: 70vw;
    height: 70vw;
    max-width: 250px;
    max-height: 250px;
  }

  .info {
    font-size: 16px;
  }

  .field {
    width: 85vw;
    height: 130vw;
    max-width: 320px;
    max-height: 480px;
  }

  .back-btn {
    margin-top: 30px;
    padding: 8px 20px;
    font-size: 14px;
  }

}

/* ===== 3-4-3 座標 ===== */

/* FW */
.fw-l { top: 15%; left: 20%; }
.fw-c { top: 12%; left: 50%; }
.fw-r { top: 15%; left: 80%; }

/* MF */
.mf-l  { top: 42%; left: 12%; }
.mf-cl { top: 45%; left: 38%; }
.mf-cr { top: 45%; left: 62%; }
.mf-r  { top: 42%; left: 88%; }

/* DF */
.df-l { top: 70%; left: 28%; }
.df-c { top: 75%; left: 50%; }
.df-r { top: 70%; left: 72%; }

.gk { top: 88%; left: 50%; }

.back-btn {
  display: inline-block;
  margin-top: 40px;
  color: white;
  text-decoration: none;
  border: 1px solid white;
  padding: 10px 25px;
  border-radius: 20px;
}
</style>

</head>
<body>

<header class="header">
  <a href="index.html" class="logo">NEW PESSI JEANS</a>
  <nav>
    <a href="NEWS.html">NEWS</a>
    <a href="member.html">MEMBERS</a>
    <a href="stats.html">STATS</a>
    <a href="ABOUT.html">ABOUT</a>
    <a href="GALLERY.html">GALLERY</a>
  </nav>
</header>

<section class="profile">

  <!-- 写真 -->
  <img src="./alex2.png" class="profile-img">

  <!-- 情報 -->
  <h1>Aleks</h1>
  <div class="info">
    <p>年齢：24</p>
    <p>ポジション：LCM　RCM　CB　LCB　RCB</p>
  </div>

  <!-- フォーメーション -->
  <div class="field-wrap">
    <div class="field">

      <div class="center-line"></div>
      <div class="center-circle"></div>
      <div class="goal top"></div>
      <div class="goal bottom"></div>

      <!-- FW -->
      <span class="pos fw-l"></span>
      <span class="pos fw-c"></span>
      <span class="pos fw-r"></span>

      <!-- MF -->
      <span class="pos mf-l"></span>
      <span class="pos mf-cl active"></span>
      <span class="pos mf-cr active"></span>
      <span class="pos mf-r"></span>

      <!-- DF -->
      <span class="pos df-l active"></span>
      <span class="pos df-c active"></span>
      <span class="pos df-r active"></span>

      <!-- GK -->
      <span class="pos gk"></span>

    </div>
  </div>

  <a href="member.html" class="back-btn">← メンバー一覧へ戻る</a>

</section>

</body>
</html>
