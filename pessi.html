<!DOCTYPE html>

<style>
/* ===== 全体 ===== */

body {
  background: linear-gradient(135deg, #b8860b, #ffd700, #b8860b);
  color: gold;
}

/* ===== 個人ページ ===== */

.profile {
  text-align: center;
  padding: 60px 20px;
}

.profile-img {
  width: 320px;
  height: 320px;
  object-fit: contain;
  border-radius: 50%;
  border: 6px solid #ffffff;
  background: gold;
  margin-bottom: 20px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

.info {
  font-size: 18px;
  line-height: 1.8;
  font-weight: bold;
}

/* ===== フィールド ===== */

.field-wrap {
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

.field {
  position: relative;
  width: 320px;
  height: 480px;
  background: linear-gradient(180deg, #0c5f2a, #1b7f3a);
  border: 5px solid gold;
  border-radius: 14px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* ライン */

.center-line {
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  height: 2px;
  background: white;
}

.center-circle {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 70px;
  height: 70px;
  border: 2px solid white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.goal {
  position: absolute;
  left: 50%;
  width: 150px;
  height: 70px;
  border: 2px solid white;
  transform: translateX(-50%);
}

.goal.top { top: 0; border-top: none; }
.goal.bottom { bottom: 0; border-bottom: none; }

/* ===== ポジション ===== */

.pos {
  position: absolute;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: white;
}

/* 全対応 → 全部光る */

.active {
  background: gold;
  animation: blink 1s infinite;
  box-shadow: 0 0 15px gold;
}

.profile-img{
  display:block;
  margin:auto;
}


@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}

/* ===== 3-4-3 ===== */

.fw-l { top: 15%; left: 20%; }
.fw-c { top: 12%; left: 50%; }
.fw-r { top: 15%; left: 80%; }

.mf-l  { top: 42%; left: 12%; }
.mf-cl { top: 45%; left: 38%; }
.mf-cr { top: 45%; left: 62%; }
.mf-r  { top: 42%; left: 88%; }

.df-l { top: 70%; left: 28%; }
.df-c { top: 75%; left: 50%; }
.df-r { top: 70%; left: 72%; }

.gk { top: 88%; left: 50%; }

.back-btn {
  display: inline-block;
  margin-top: 45px;
  color: black;
  font-weight: bold;
  text-decoration: none;
  border: 2px solid black;
  padding: 12px 28px;
  border-radius: 25px;
  background: gold;
}

/* ===== 📱 MOBILE ===== */
@media (max-width: 768px) {

  .profile {
    padding: 35px 15px;
  }

  .profile-img {
    width: 75vw;
    height: 75vw;
    max-width: 280px;
    max-height: 280px;
  }

  .info {
    font-size: 16px;
  }

  .field {
    width: 88vw;
    height: 135vw;
    max-width: 330px;
    max-height: 500px;
  }

  .back-btn {
    margin-top: 30px;
    padding: 10px 22px;
    font-size: 14px;
  }

}
</style>

</head>

  <div class="info">
