<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>yuma | NEW PESSI JEANS</title>
  <link rel="stylesheet" href="npj.css">
  <link rel="icon" href="favicon.ico">

<style>
.profile {
  text-align: center;
  padding: 50px 20px;
}

.profile-img {
  width: 300px;
  height: 300px;
  object-fit: contain;
  border-radius: 50%;
  border: 4px solid #fff;
  background: #000;
  margin-bottom: 20px;
}

.info {
  font-size: 18px;
  line-height: 1.8;
}

/* フィールド */
.field-wrap {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.field {
  position: relative;
  width: 300px;
  height: 460px;
  background: #1b7f3a;
  border: 4px solid white;
  border-radius: 12px;
}

.center-line {
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  height: 2px;
  background: white;
}

.center-circle {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 70px;
  height: 70px;
  border: 2px solid white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.goal {
  position: absolute;
  left: 50%;
  width: 150px;
  height: 70px;
  border: 2px solid white;
  transform: translateX(-50%);
}

.goal.top { top: 0; border-top: none; }
.goal.bottom { bottom: 0; border-bottom: none; }

.pos {
  position: absolute;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: white;
}

.active {
  background: #00ffff;
  animation: blink 1s infinite;
  box-shadow: 0 0 12px #00ffff;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}

/* 3-4-3 */
.fw-l { top: 15%; left: 20%; }
.fw-c { top: 12%; left: 50%; }
.fw-r { top: 15%; left: 80%; }

.mf-l  { top: 42%; left: 12%; }
.mf-cl { top: 45%; left: 38%; }
.mf-cr { top: 45%; left: 62%; }
.mf-r  { top: 42%; left: 88%; }

.df-l { top: 70%; left: 28%; }
.df-c { top: 75%; left: 50%; }
.df-r { top: 70%; left: 72%; }

.gk { top: 88%; left: 50%; }

.back-btn {
  display: inline-block;
  margin-top: 40px;
  color: white;
  text-decoration: none;
  border: 1px solid white;
  padding: 10px 25px;
  border-radius: 20px;
}
</style>

</head>
<body>

<header class="header">
  <a href="index.html" class="logo">NEW PESSI JEANS</a>
  <nav>
    <a href="NEWS.html">NEWS</a>
    <a href="member.html">MEMBERS</a>
    <a href="ABOUT.html">ABOUT</a>
    <a href="GALLERY.html">GALLERY</a>
  </nav>
</header>

<section class="profile">

  <!-- 写真 -->
  <img src="./yumasan2.png" class="profile-img">

  <!-- 情報 -->
  <h1>yuma</h1>
  <div class="info">
    <p>年齢：29</p>
    <p>ポジション：ALL POSITIONS</p>
  </div>

  <!-- フォーメーション -->
  <div class="field-wrap">
    <div class="field">

      <div class="center-line"></div>
      <div class="center-circle"></div>
      <div class="goal top"></div>
      <div class="goal bottom"></div>

      <!-- FW -->
      <span class="pos fw-l active"></span>
      <span class="pos fw-c active"></span>
      <span class="pos fw-r active"></span>

      <!-- MF -->
      <span class="pos mf-l active"></span>
      <span class="pos mf-cl active"></span>
      <span class="pos mf-cr active"></span>
      <span class="pos mf-r active"></span>

      <!-- DF -->
      <span class="pos df-l active"></span>
      <span class="pos df-c active"></span>
      <span class="pos df-r active"></span>

      <!-- GK -->
      <span class="pos gk active"></span>

    </div>
  </div>

  <a href="member.html" class="back-btn">← メンバー一覧へ戻る</a>

</section>

</body>
</html>
